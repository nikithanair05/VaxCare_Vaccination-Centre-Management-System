<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaxCare – Smart Vaccination Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="navbar">
    <div class="nav-left">
        <h2>VaxCare - Smart Vaccination Management System </h2>
    </div>

    <div class="nav-right">
       <a href="{{ url_for('admin_login') }}" class="nav-btn">Admin</a>
       <a href="{{ url_for('staff_login') }}" class="nav-btn outline">Staff</a>
    </div>
</header>


<section class="hero">
    <div class="hero-left">
        <h1>
            Smart Care for <br>
            <span>Safer Vaccination</span>
        </h1>

        <p>
            VaxCare helps you book vaccination slots, track status,
            and manage centres efficiently through a smart digital platform.

        </p>
        
<div class="login-card">
  <h3>Login</h3>

  <form method="POST" action="{{ url_for('login') }}">
    <input type="email" name="email" placeholder="Email ID" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit" class="login-btn">Login</button>
  </form>
{% if error %}
<p style="color:red; text-align:center;">{{ error }}</p>
{% endif %}

  <p class="register-link">
    New user? <a href="/register">Register here</a>
  </p>
</div>
</div>
</section>

</body>
</html>
