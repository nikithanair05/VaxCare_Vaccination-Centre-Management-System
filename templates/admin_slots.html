<!DOCTYPE html>
<html>
<head>
    <title>Manage Slots | VaxCare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="dashboard-navbar">
    <h2>Manage Vaccination Slots</h2>
    <a href="/admin-dashboard" class="logout-btn">Back</a>
</header>

<section class="dashboard-container">

<h3>Create New Slot</h3>

<form method="POST" class="form-card">

    <label>Centre</label>
    <select name="centre_id" required>
        {% for centre in centres %}
        <option value="{{ centre.centre_id }}">{{ centre.name }}</option>
        {% endfor %}
    </select>

    <label>Date</label>
    <input type="date" name="date" required>

    <label>Start Time</label>
    <input type="time" name="start_time" required>

    <label>End Time</label>
    <input type="time" name="end_time" required>

    <label>Capacity</label>
    <input type="number" name="capacity" required>

    <label>Vaccine</label>
    <input type="text" name="vaccine" placeholder="Eg: Covishield" required>

    <button type="submit">Create Slot</button>
</form>


<h3 style="margin-top:30px;">Existing Slots</h3>
<table class="centre-table">
    <tr>
        <th>Centre</th>
        <th>Date</th>
        <th>Time</th>
        <th>Capacity</th>
        <th>Vaccine</th>
        <th>Actions</th>
    </tr>

    {% for slot in slots %}
    <tr>
        <td>{{ slot.centre_name }}</td>
        <td>{{ slot.date }}</td>
        <td>{{ slot.start_time }} - {{ slot.end_time }}</td>
        <td>{{ slot.capacity }}</td>
        <td>{{ slot.vaccine }}</td>
        <td>
            <a href="{{ url_for('edit_slot', slot_id=slot.slot_id) }}" class="action-btn edit">
                Edit
            </a>

            <a href="{{ url_for('delete_slot', slot_id=slot.slot_id) }}"
               class="action-btn delete"
               onclick="return confirm('Are you sure you want to delete this slot?');">
                Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>


</section>

</body>
</html>
